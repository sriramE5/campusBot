<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body,html{
    height:100%;
    font-family: Arial, sans-serif;
}

.hero{
    height:100vh;
    background-image:url("https://universityinnovation.org/images/1/1a/Logo1.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

.explore-btn{
    padding:15px 40px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:#ffffff;
    color:#000;
    cursor:pointer;
    transition:0.3s;
}

.explore-btn:hover{
    background:#000;
    color:#fff;
}
</style>
</head>

<body>

<div class="hero">
    <a href="frontend/index.html" class="explore-btn">Explore</a>
</div>

</body>
</html>
